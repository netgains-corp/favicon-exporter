<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Exporter | Sales Force One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome für die Pfeile -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: #ffffff; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-black text-white p-6 relative">

    <!-- Hintergrund-Deko (ähnlich wie im Dashboard) -->
    <div class="fixed top-[-10%] left-[-5%] w-[500px] h-[500px] bg-teal-800/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-cyan-800/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-lg w-full glass-panel p-8 md:p-10 rounded-3xl shadow-2xl flex flex-col items-center text-center relative z-10">
        
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-teal-500/10 border border-teal-500/20 text-teal-300 text-[10px] font-black tracking-widest uppercase mb-4 shadow-[0_0_20px_rgba(45,212,191,0.1)]">
            Design Studio
        </div>
        
        <h1 class="text-3xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 mb-4 drop-shadow-lg">
            SFO Favicon Exporter
        </h1>
        
        <!-- Kurze Erklärung -->
        <p class="text-sm text-slate-400 mb-8 leading-relaxed max-w-sm">
            Wähle dein bevorzugtes Icon-Design aus. Das Tool rendert das Vektor-Logo (SVG) live in deinem Browser und exportiert es als sauberes, hochauflösendes <strong class="text-slate-200">512x512px PNG</strong> – perfekt als Favicon oder App-Icon, ohne Qualitätsverlust.
        </p>

        <!-- Preview Area mit Pfeilen -->
        <div class="flex items-center justify-center gap-6 w-full mb-8">
            <button onclick="prevIcon()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-teal-400 hover:scale-110 active:scale-95 transition-all shadow-lg">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <!-- Der Container, in dem das SVG injiziert wird -->
            <div id="icon-container" class="w-48 h-48 p-2 rounded-3xl shadow-[0_0_40px_rgba(45,212,191,0.2)] flex items-center justify-center transition-transform duration-300 transform">
                <!-- SVG wird per JS geladen -->
            </div>

            <button onclick="nextIcon()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-teal-400 hover:scale-110 active:scale-95 transition-all shadow-lg">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <!-- Pagination Dots -->
        <div id="dots-container" class="flex gap-2 mb-8">
            <!-- Dots werden per JS geladen -->
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full">
            <button onclick="downloadImage('png')" class="flex-1 py-4 rounded-xl bg-gradient-to-r from-teal-500 to-cyan-600 hover:from-teal-400 hover:to-cyan-500 text-black font-black uppercase tracking-widest shadow-[0_0_20px_rgba(45,212,191,0.3)] transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-solid fa-download text-lg"></i>
                PNG
            </button>
            <button onclick="downloadImage('webp')" class="flex-1 py-4 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-black uppercase tracking-widest shadow-[0_0_20px_rgba(99,102,241,0.3)] transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-solid fa-download text-lg"></i>
                WEBP
            </button>
        </div>
        <p class="text-xs text-slate-500 mt-4 font-medium uppercase tracking-widest">Transparenter Hintergrund • 512x512px</p>
    </div>

    <script>
        // Gemeinsame Definitionen für Farbverläufe und den neuen, echten Drop-Shadow
        const svgDefs = `
            <defs>
                <!-- Äußerer Rahmen Farbverlauf -->
                <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#0f766e"/>
                    <stop offset="100%" stop-color="#06b6d4"/>
                </linearGradient>
                <!-- Inneres Icon Farbverlauf -->
                <linearGradient id="icon-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#2dd4bf"/>
                    <stop offset="100%" stop-color="#0891b2"/>
                </linearGradient>
                <!-- SVG Drop Shadow für den 3D Effekt -->
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
                    <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.5"/>
                </filter>
            </defs>
            <!-- Der Rahmen: x=4, y=4, w=92, h=92 schützt vor dem Abschneiden der Ränder (Clipping) -->
            <rect x="4" y="4" width="92" height="92" rx="22" fill="#080808" stroke="url(#bg-grad)" stroke-width="4" />
        `;

        // Verschiedene Icon-Pfade (Die inneren Symbole)
        const icons = [
            // 1. Der Blitz (Performance / Energy)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <path d="M58 25 L32 55 L50 55 L42 80 L72 45 L54 45 Z" fill="url(#icon-grad)" filter="url(#shadow)"/>
            </svg>`,
            
            // 2. Trend Up (Sales / Growth)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <path d="M25 70 L45 50 L55 60 L75 35" fill="none" stroke="url(#icon-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
                <polygon points="75,25 75,45 65,35" fill="url(#icon-grad)" filter="url(#shadow)"/>
            </svg>`,

            // 3. Target (Focus / Closing)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <circle cx="50" cy="50" r="22" fill="none" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/>
                <circle cx="50" cy="50" r="8" fill="url(#icon-grad)" filter="url(#shadow)"/>
                <line x1="50" y1="15" x2="50" y2="25" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>
                <line x1="50" y1="75" x2="50" y2="85" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>
                <line x1="15" y1="50" x2="25" y2="50" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>
                <line x1="75" y1="50" x2="85" y2="50" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>
            </svg>`,

            // 4. Die "1" (Sales Force ONE)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <path d="M42 30 L52 25 L52 75 M42 75 L62 75" fill="none" stroke="url(#icon-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
            </svg>`,

            // 5. Balkendiagramm (Analytics / High Performance)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <rect x="22" y="50" width="14" height="30" rx="4" fill="url(#icon-grad)" filter="url(#shadow)"/>
                <rect x="43" y="35" width="14" height="45" rx="4" fill="url(#icon-grad)" filter="url(#shadow)"/>
                <rect x="64" y="20" width="14" height="60" rx="4" fill="url(#icon-grad)" filter="url(#shadow)"/>
            </svg>`,

            // 6. Globus / Marktpräsenz (Passend zum Dashboard)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <circle cx="50" cy="50" r="26" fill="none" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/>
                <ellipse cx="50" cy="50" rx="10" ry="26" fill="none" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/>
                <line x1="24" y1="50" x2="76" y2="50" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/>
            </svg>`,

            // 7. Diamant (Premium / Value)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <path d="M50 20 L80 40 L50 80 L20 40 Z" fill="url(#icon-grad)" filter="url(#shadow)"/>
            </svg>`,

            // 8. Stern (Top Performer)
            `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                ${svgDefs}
                <polygon points="50,20 59,38 79,41 64,55 68,75 50,65 32,75 36,55 21,41 41,38" fill="url(#icon-grad)" stroke="url(#icon-grad)" stroke-width="2" stroke-linejoin="round" filter="url(#shadow)"/>
            </svg>`
        ];

        let currentIndex = 0;
        const container = document.getElementById('icon-container');
        const dotsContainer = document.getElementById('dots-container');

        function renderIcon() {
            // Animierter Übergang
            container.style.transform = 'scale(0.9)';
            container.style.opacity = '0.5';
            
            setTimeout(() => {
                container.innerHTML = icons[currentIndex];
                container.style.transform = 'scale(1)';
                container.style.opacity = '1';
                updateDots();
            }, 150);
        }

        function updateDots() {
            dotsContainer.innerHTML = '';
            icons.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full transition-all duration-300 ${idx === currentIndex ? 'bg-teal-400 w-6 shadow-[0_0_10px_rgba(45,212,191,0.5)]' : 'bg-slate-600'}`;
                dotsContainer.appendChild(dot);
            });
        }

        function nextIcon() {
            currentIndex = (currentIndex + 1) % icons.length;
            renderIcon();
        }

        function prevIcon() {
            currentIndex = (currentIndex - 1 + icons.length) % icons.length;
            renderIcon();
        }

        function downloadImage(format) {
            const svg = document.getElementById('current-svg');
            const svgData = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement("canvas");
            
            // Standardgröße für hochauflösende Icons
            canvas.width = 512;
            canvas.height = 512;
            
            const ctx = canvas.getContext("2d");
            const img = new Image();
            
            // Konvertiere zu Base64 (sicher für alle Zeichen)
            const svgBase64 = btoa(unescape(encodeURIComponent(svgData)));
            img.src = "data:image/svg+xml;base64," + svgBase64;
            
            img.onload = function() {
                // Zeichnen
                ctx.drawImage(img, 0, 0, 512, 512);
                
                // Exportieren mit dem gewünschten MIME-Type (image/png oder image/webp)
                const mimeType = format === 'webp' ? 'image/webp' : 'image/png';
                const quality = format === 'webp' ? 1.0 : undefined; // Bei WebP maximale Qualität fordern
                
                const url = canvas.toDataURL(mimeType, quality);
                const a = document.createElement("a");
                a.download = `SalesForceOne-Icon-${currentIndex + 1}.${format}`;
                a.href = url;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
        }

        // Init beim Laden
        renderIcon();
    </script>
</body>
</html>
