<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favicon Exporter | Sales Force One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Druk Wide Bold Font für die Headline -->
    <link href="https://fonts.cdnfonts.com/css/druk-wide-bold" rel="stylesheet">
    
    <!-- FontAwesome für die Pfeile -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Dynamisches Favicon -->
    <link id="dynamic-favicon" rel="icon" type="image/svg+xml" href="">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: #ffffff; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .font-druk { font-family: 'Druk Wide Bold', sans-serif !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-black text-white p-6 relative">

    <!-- Hintergrund-Deko (ähnlich wie im Dashboard) -->
    <div class="fixed top-[-10%] left-[-5%] w-[500px] h-[500px] bg-teal-800/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-cyan-800/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-xl w-full glass-panel p-6 md:p-10 rounded-3xl shadow-2xl flex flex-col items-center text-center relative z-10 transition-all">
        
        <!-- Header -->
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-teal-500/10 border border-teal-500/20 text-teal-300 text-[10px] font-black tracking-widest uppercase mb-4 shadow-[0_0_20px_rgba(45,212,191,0.1)]">
            NetGains Studio
        </div>
        
        <h1 class="font-druk text-xl md:text-2xl uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-cyan-400 mb-2 drop-shadow-lg" id="main-title">
            Favicon Generator
        </h1>
        
        <!-- Kurze Erklärung -->
        <p class="text-sm text-slate-400 mb-6 leading-relaxed max-w-sm">
            Passe Form und Farbe an. Das Design ändert sofort das Favicon deines Browser-Tabs in Echtzeit und lässt sich direkt passend für euer Repo exportieren.
        </p>

        <!-- Preview Area mit Pfeilen -->
        <div class="flex items-center justify-center gap-6 w-full mb-6">
            <button onclick="prevIcon()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 active:scale-95 transition-all shadow-lg">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <!-- Der Container, in dem das SVG injiziert wird -->
            <div id="icon-container" class="w-40 h-40 p-2 rounded-3xl shadow-[0_0_40px_rgba(45,212,191,0.2)] flex items-center justify-center transition-transform duration-300 transform">
                <!-- SVG wird per JS geladen -->
            </div>

            <button onclick="nextIcon()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 active:scale-95 transition-all shadow-lg">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <!-- Controls: Form & Farbe -->
        <div class="w-full grid grid-cols-2 gap-4 mb-8">
            <!-- Form -->
            <div class="flex flex-col items-center p-3 rounded-2xl bg-black/30 border border-white/5">
                <span class="text-[10px] uppercase tracking-widest text-slate-500 mb-3 font-bold">Form</span>
                <div class="flex gap-2">
                    <button onclick="setShape('squircle')" id="btn-shape-squircle" class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/20 border border-transparent transition-all flex items-center justify-center text-slate-300" title="Squircle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="6"/></svg>
                    </button>
                    <button onclick="setShape('circle')" id="btn-shape-circle" class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/20 border border-transparent transition-all flex items-center justify-center text-slate-300" title="Kreis">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
                    </button>
                    <button onclick="setShape('hexagon')" id="btn-shape-hexagon" class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/20 border border-transparent transition-all flex items-center justify-center text-slate-300" title="Hexagon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 21,7 21,17 12,22 3,17 3,7"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Farbe -->
            <div class="flex flex-col items-center p-3 rounded-2xl bg-black/30 border border-white/5">
                <span class="text-[10px] uppercase tracking-widest text-slate-500 mb-3 font-bold">Farbe</span>
                <div class="flex gap-3 mt-1">
                    <button onclick="setColor('teal')" id="btn-color-teal" class="w-8 h-8 rounded-full bg-gradient-to-br from-teal-400 to-cyan-500 border-2 border-transparent hover:scale-110 transition-all"></button>
                    <button onclick="setColor('indigo')" id="btn-color-indigo" class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 border-2 border-transparent hover:scale-110 transition-all"></button>
                    <button onclick="setColor('rose')" id="btn-color-rose" class="w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 to-orange-500 border-2 border-transparent hover:scale-110 transition-all"></button>
                    <button onclick="setColor('gold')" id="btn-color-gold" class="w-8 h-8 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-600 border-2 border-transparent hover:scale-110 transition-all" title="NetGains Gold"></button>
                </div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full">
            <button onclick="downloadImage('png')" class="flex-1 py-4 rounded-xl bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 text-white font-black uppercase tracking-widest shadow-lg transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-solid fa-download text-lg"></i>
                PNG
            </button>
            <button onclick="downloadImage('webp')" id="btn-primary-export" class="flex-1 py-4 rounded-xl bg-gradient-to-r from-teal-500 to-cyan-600 hover:from-teal-400 hover:to-cyan-500 text-black font-black uppercase tracking-widest shadow-[0_0_20px_rgba(45,212,191,0.3)] transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-solid fa-bolt text-lg"></i>
                WEBP
            </button>
        </div>
        <p class="text-xs text-slate-500 mt-4 font-medium uppercase tracking-widest">Transparenter Hintergrund • 512x512px</p>
    </div>

    <script>
        // --- KONFIGURATION FÜR GENERATOR ---

        // 1. Farb-Themes
        const colorThemes = {
            teal: { bg1: '#0f766e', bg2: '#06b6d4', ic1: '#2dd4bf', ic2: '#0891b2', glow: 'rgba(45,212,191,0.2)', btnClass: 'from-teal-400 to-cyan-500 text-black', titleClass: 'from-teal-400 to-cyan-400' },
            indigo: { bg1: '#3730a3', bg2: '#7c3aed', ic1: '#818cf8', ic2: '#4f46e5', glow: 'rgba(99,102,241,0.2)', btnClass: 'from-indigo-400 to-purple-500 text-white', titleClass: 'from-indigo-400 to-purple-400' },
            rose: { bg1: '#9f1239', bg2: '#ea580c', ic1: '#fb7185', ic2: '#f97316', glow: 'rgba(244,63,94,0.2)', btnClass: 'from-rose-400 to-orange-500 text-white', titleClass: 'from-rose-400 to-orange-400' },
            gold: { bg1: '#422006', bg2: '#a16207', ic1: '#fde047', ic2: '#eab308', glow: 'rgba(234,179,8,0.2)', btnClass: 'from-yellow-300 to-yellow-500 text-black', titleClass: 'from-yellow-300 to-yellow-500' }
        };

        // 2. Formen (Außenrahmen)
        const shapes = {
            squircle: `<rect x="4" y="4" width="92" height="92" rx="22" fill="#080808" stroke="url(#bg-grad)" stroke-width="4" />`,
            circle: `<circle cx="50" cy="50" r="46" fill="#080808" stroke="url(#bg-grad)" stroke-width="4" />`,
            hexagon: `<polygon points="50,4 90,26 90,74 50,96 10,74 10,26" fill="#080808" stroke="url(#bg-grad)" stroke-width="4" stroke-linejoin="round"/>`
        };

        // 3. Innere Icons (Pfade/Shapes)
        const innerIcons = [
            // 1. Der Blitz (Performance / Energy)
            `<path d="M58 25 L32 55 L50 55 L42 80 L72 45 L54 45 Z" fill="url(#icon-grad)" filter="url(#shadow)"/>`,
            // 2. Trend Up (Sales / Growth)
            `<path d="M25 70 L45 50 L55 60 L75 35" fill="none" stroke="url(#icon-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/><polygon points="75,25 75,45 65,35" fill="url(#icon-grad)" filter="url(#shadow)"/>`,
            // 3. Target (Focus / Closing)
            `<circle cx="50" cy="50" r="22" fill="none" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/><circle cx="50" cy="50" r="8" fill="url(#icon-grad)" filter="url(#shadow)"/><line x1="50" y1="15" x2="50" y2="25" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/><line x1="50" y1="75" x2="50" y2="85" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/><line x1="15" y1="50" x2="25" y2="50" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/><line x1="75" y1="50" x2="85" y2="50" stroke="url(#icon-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)"/>`,
            // 4. Die "1" (Sales Force ONE)
            `<path d="M42 30 L52 25 L52 75 M42 75 L62 75" fill="none" stroke="url(#icon-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>`,
            // 5. Balkendiagramm (Analytics)
            `<rect x="22" y="50" width="14" height="30" rx="4" fill="url(#icon-grad)" filter="url(#shadow)"/><rect x="43" y="35" width="14" height="45" rx="4" fill="url(#icon-grad)" filter="url(#shadow)"/><rect x="64" y="20" width="14" height="60" rx="4" fill="url(#icon-grad)" filter="url(#shadow)"/>`,
            // 6. Globus / Marktpräsenz
            `<circle cx="50" cy="50" r="26" fill="none" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/><ellipse cx="50" cy="50" rx="10" ry="26" fill="none" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/><line x1="24" y1="50" x2="76" y2="50" stroke="url(#icon-grad)" stroke-width="6" filter="url(#shadow)"/>`,
            // 7. Diamant (Premium / Value)
            `<path d="M50 20 L80 40 L50 80 L20 40 Z" fill="url(#icon-grad)" filter="url(#shadow)"/>`,
            // 8. Stern (Top Performer)
            `<polygon points="50,20 59,38 79,41 64,55 68,75 50,65 32,75 36,55 21,41 41,38" fill="url(#icon-grad)" stroke="url(#icon-grad)" stroke-width="2" stroke-linejoin="round" filter="url(#shadow)"/>`,
            // 9. NEU: Rakete (Launch / Start)
            `<path d="M50 20 L65 40 L65 65 L80 80 L20 80 L35 65 L35 40 Z" fill="url(#icon-grad)" filter="url(#shadow)"/><polygon points="40,80 60,80 50,95" fill="url(#icon-grad)" filter="url(#shadow)"/>`,
            // 10. NEU: Zahnrad (Automatisierung / Systeme)
            `<circle cx="50" cy="50" r="14" fill="none" stroke="url(#icon-grad)" stroke-width="8" filter="url(#shadow)"/><path d="M46 15 L54 15 L56 25 L44 25 Z M46 85 L54 85 L56 75 L44 75 Z M15 46 L15 54 L25 56 L25 44 Z M85 46 L85 54 L75 56 L75 44 Z M26 26 L32 32 L36 26 L30 20 Z M74 74 L68 68 L64 74 L70 80 Z M74 26 L68 32 L64 26 L70 20 Z M26 74 L32 68 L36 74 L30 80 Z" fill="url(#icon-grad)" filter="url(#shadow)"/>`,
            // 11. NEU: Schild (Sicherheit / Trust)
            `<path d="M50 15 L20 28 L20 55 C20 75 40 85 50 90 C60 85 80 75 80 55 L80 28 Z" fill="none" stroke="url(#icon-grad)" stroke-width="8" stroke-linejoin="round" filter="url(#shadow)"/><path d="M35 50 L45 60 L65 35" fill="none" stroke="url(#icon-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>`,
            // 12. NEU: Krone (Leadership)
            `<path d="M15 75 L85 75 L95 35 L65 55 L50 20 L35 55 L5 35 Z" fill="url(#icon-grad)" stroke="url(#icon-grad)" stroke-width="2" stroke-linejoin="round" filter="url(#shadow)"/>`
        ];

        // --- STATE ---
        let currentIndex = 0;
        let currentShape = 'squircle';
        let currentColor = 'teal';

        const container = document.getElementById('icon-container');

        function renderIcon() {
            // Animierter Übergang
            container.style.transform = 'scale(0.9)';
            container.style.opacity = '0.5';
            
            setTimeout(() => {
                const theme = colorThemes[currentColor];
                const shapeSVG = shapes[currentShape];
                const iconSVG = innerIcons[currentIndex];

                // Dynamisches Zusammenbauen des SVG
                const fullSVG = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="current-svg" class="w-full h-full drop-shadow-2xl">
                        <defs>
                            <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="${theme.bg1}"/>
                                <stop offset="100%" stop-color="${theme.bg2}"/>
                            </linearGradient>
                            <linearGradient id="icon-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="${theme.ic1}"/>
                                <stop offset="100%" stop-color="${theme.ic2}"/>
                            </linearGradient>
                            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                                <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
                                <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.5"/>
                            </filter>
                        </defs>
                        ${shapeSVG}
                        ${iconSVG}
                    </svg>
                `;

                container.innerHTML = fullSVG;
                container.style.transform = 'scale(1)';
                container.style.opacity = '1';
                
                // --- NEU: Dynamisches Favicon für den Browser-Tab setzen ---
                const favicon = document.getElementById('dynamic-favicon');
                if (favicon) {
                    favicon.href = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(fullSVG);
                }
                
                // Glow-Effekt des Containers an Farbe anpassen
                container.style.boxShadow = `0 0 40px ${theme.glow}`;
                
                // Titel und Buttons dynamisch anpassen (jetzt inkl. "font-druk" statt "font-black" für die Headline)
                document.getElementById('main-title').className = `font-druk text-xl md:text-2xl uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r ${theme.titleClass} mb-2 drop-shadow-lg transition-all duration-500`;
                
                const primaryBtn = document.getElementById('btn-primary-export');
                primaryBtn.className = `flex-1 py-4 rounded-xl bg-gradient-to-r ${theme.btnClass} font-black uppercase tracking-widest shadow-[0_0_20px_${theme.glow}] transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3`;

            }, 150);
        }

        function setShape(shape) {
            currentShape = shape;
            updateUIControls();
            renderIcon();
        }

        function setColor(color) {
            currentColor = color;
            updateUIControls();
            renderIcon();
        }

        function updateUIControls() {
            // Form Buttons updaten
            ['squircle', 'circle', 'hexagon'].forEach(shape => {
                const btn = document.getElementById('btn-shape-' + shape);
                if (shape === currentShape) {
                    btn.classList.add('bg-white/20', 'text-white', 'border-white/30');
                    btn.classList.remove('bg-white/5', 'text-slate-300', 'border-transparent');
                } else {
                    btn.classList.add('bg-white/5', 'text-slate-300', 'border-transparent');
                    btn.classList.remove('bg-white/20', 'text-white', 'border-white/30');
                }
            });
            
            // Farb Buttons updaten
            ['teal', 'indigo', 'rose', 'gold'].forEach(color => {
                const btn = document.getElementById('btn-color-' + color);
                if (color === currentColor) {
                    btn.classList.add('border-white', 'scale-125', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]');
                    btn.classList.remove('border-transparent');
                } else {
                    btn.classList.add('border-transparent');
                    btn.classList.remove('border-white', 'scale-125', 'shadow-[0_0_15px_rgba(255,255,255,0.4)]');
                }
            });
        }

        function nextIcon() {
            currentIndex = (currentIndex + 1) % innerIcons.length;
            renderIcon();
        }

        function prevIcon() {
            currentIndex = (currentIndex - 1 + innerIcons.length) % innerIcons.length;
            renderIcon();
        }

        function downloadImage(format) {
            const svg = document.getElementById('current-svg');
            const svgData = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement("canvas");
            
            canvas.width = 512;
            canvas.height = 512;
            
            const ctx = canvas.getContext("2d");
            const img = new Image();
            
            const svgBase64 = btoa(unescape(encodeURIComponent(svgData)));
            img.src = "data:image/svg+xml;base64," + svgBase64;
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, 512, 512);
                
                const mimeType = format === 'webp' ? 'image/webp' : 'image/png';
                const quality = format === 'webp' ? 1.0 : undefined; 
                
                const url = canvas.toDataURL(mimeType, quality);
                const a = document.createElement("a");
                
                // EXAKT der gewünschte Name fürs Repo
                a.download = `icon_icon.${format}`;
                
                a.href = url;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
        }

        // Init beim Laden
        updateUIControls();
        renderIcon();
    </script>
</body>
</html>
